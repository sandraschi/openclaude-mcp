name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: uv sync --extra dev
      - name: Ruff check
        run: uv run ruff check server.py openclaude/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: uv sync --extra dev
      - name: Unit + smoke tests
        run: uv run pytest tests/unit/ tests/smoke/ tests/integration/ -v --tb=short
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: pytest-logs
          path: .pytest_cache/
