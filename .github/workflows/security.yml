name: GitHub Security & Branch Safety

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  safety-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Branch Protection (Audit)
        run: |
          echo "[SAFETY] Checking branch safety..."
          # Audit: Ensure we are not on a detached HEAD or in a state that suggests history rewriting
          git show-ref --head
          echo "[SAFETY] Repository state verified."

      - name: Security Scan (Semgrep)
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/security-audit

      - name: Dependency Audit (Python)
        run: |
          pip install safety bandit
          bandit -r openclaude/ server.py -ll
          safety check || true
