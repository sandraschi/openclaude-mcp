services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  mcp:
    build: .
    ports:
      - "10932:10932"
    environment:
      OPENCLAUDE_MCP_PORT: "10932"
      OLLAMA_BASE_URL: "http://ollama:11434"
      OPENCLAUDE_DIR: "/openclaude"
    volumes:
      - openclaude_data:/data
    depends_on:
      - ollama
    restart: unless-stopped

  webapp:
    image: nginx:alpine
    ports:
      - "10933:80"
    volumes:
      - ./webapp/dist:/usr/share/nginx/html:ro
      - ./webapp/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - mcp
    restart: unless-stopped

volumes:
  ollama_data:
  openclaude_data:
