[pytest]
asyncio_mode = auto
markers =
    integration: requires running backend on :10932
    e2e: starts server as subprocess (~15s)
    requires_ollama: requires Ollama running with a model pulled

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show locals on failure, short tracebacks in CI
addopts = --tb=short -q
